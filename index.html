<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Type Battle Arena</title>
    <style>
        :root {
            --fire: #ff4757;
            --water: #2ed573; /* Using dynamic colors for game aesthetics */
            --water-real: #1e90ff;
            --grass: #2ed573;
            --bg-dark: #1e272e;
            --panel-bg: #2f3542;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            background: linear-gradient(45deg, #ff4757, #1e90ff, #2ed573);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-container {
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 2px solid #57606f;
        }

        /* Battle Stage Layout */
        .battle-stage {
            display: flex;
            justify-content: space-between;
            padding: 40px;
            background: linear-gradient(to bottom, #341f97, #5f27cd);
            position: relative;
            border-bottom: 4px solid #57606f;
            overflow: hidden;
        }

        .pokemon-card {
            width: 45%;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }

        .pokemon-card.shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-3deg); }
            40% { transform: translateX(10px) rotate(3deg); }
            60% { transform: translateX(-10px) rotate(-3deg); }
            80% { transform: translateX(10px) rotate(3deg); }
            100% { transform: translateX(0); }
        }

        .pokemon-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .type-fire { background-color: var(--fire); }
        .type-water { background-color: var(--water-real); }
        .type-grass { background-color: var(--grass); }

        /* HP Bar Styles */
        .hp-container {
            margin-top: 10px;
        }

        .hp-text {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .hp-bar-outer {
            width: 100%;
            height: 20px;
            background-color: #747d8c;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #2f3542;
        }

        .hp-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, #2ed573, #7bed9f);
            transition: width 0.4s ease-out;
        }

        /* Control Center Panel */
        .control-panel {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-fire { background-color: var(--fire); color: white; }
        .btn-water { background-color: var(--water-real); color: white; }
        .btn-grass { background-color: var(--grass); color: white; }
        
        .btn-reset {
            background-color: #747d8c;
            color: white;
            margin-top: 10px;
        }

        /* Scrolling Battle Feed */
        .battle-log {
            background-color: #1e272e;
            border: 2px solid #57606f;
            border-radius: 8px;
            padding: 15px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-entry {
            padding-bottom: 4px;
            border-bottom: 1px dashed #3d3d3d;
        }

        .log-system { color: #eccc68; font-weight: bold; }
        .log-damage { color: #ff6b6b; }
        .log-effective { color: #2ed573; font-weight: bold; }
        .log-ineffective { color: #ff4757; font-weight: bold; }
        .log-victory { color: #1e90ff; font-weight: bold; font-size: 1.1rem; text-align: center; margin-top: 10px;}
    </style>
</head>
<body>

    <h1>Type Battle Arena</h1>

    <div class="game-container">
        <!-- Battle Graphic Stage -->
        <div class="battle-stage">
            <!-- Player Panel -->
            <div class="pokemon-card" id="player-card">
                <div class="pokemon-name">Your Pokémon</div>
                <div id="player-badge" class="type-badge type-fire">Selected: None</div>
                <div class="hp-container">
                    <div class="hp-text">
                        <span>HP</span>
                        <span id="player-hp-val">100 / 100</span>
                    </div>
                    <div class="hp-bar-outer">
                        <div id="player-hp-bar" class="hp-bar-inner"></div>
                    </div>
                </div>
            </div>

            <!-- Enemy Computer Panel -->
            <div class="pokemon-card" id="enemy-card">
                <div class="pokemon-name">Enemy AI</div>
                <div id="enemy-badge" class="type-badge type-water">Selected: None</div>
                <div class="hp-container">
                    <div class="hp-text">
                        <span>HP</span>
                        <span id="enemy-hp-val">100 / 100</span>
                    </div>
                    <div class="hp-bar-outer">
                        <div id="enemy-hp-bar" class="hp-bar-inner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gameplay Controls & Logger -->
        <div class="control-panel">
            <h3 style="text-align: center; letter-spacing: 1px;">CHOOSE YOUR ELEMENT ATTACK</h3>
            <div class="action-row" id="battle-actions">
                <button class="btn btn-fire" onclick="playTurn('fire')">🔥 Fire</button>
                <button class="btn btn-water" onclick="playTurn('water')">💧 Water</button>
                <button class="btn btn-grass" onclick="playTurn('grass')">🍃 Grass</button>
            </div>
            
            <div class="action-row" id="reset-row" style="display: none;">
                <button class="btn btn-reset" onclick="resetGame()">🔄 Battle Again</button>
            </div>

            <div class="battle-log" id="log-container">
                <div class="log-entry log-system">> Welcome to the Arena! Choose a move to instantly deploy a typed attack sequence...</div>
            </div>
        </div>
    </div>

    <script>
        // Game State Core Constants matching your Java setup
        let playerHP = 100;
        let enemyHP = 100;
        const BASE_DAMAGE = 15;
        const types = ['fire', 'water', 'grass'];

        const logContainer = document.getElementById('log-container');

        function appendLog(text, className = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${className}`;
            entry.innerHTML = text;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateHPMeters() {
            // Player UI Updates
            const pPct = Math.max(0, (playerHP / 100) * 100);
            document.getElementById('player-hp-bar').style.width = pPct + '%';
            document.getElementById('player-hp-val').innerText = `${Math.max(0, playerHP)} / 100`;

            // Enemy UI Updates
            const ePct = Math.max(0, (enemyHP / 100) * 100);
            document.getElementById('enemy-hp-bar').style.width = ePct + '%';
            document.getElementById('enemy-hp-val').innerText = `${Math.max(0, enemyHP)} / 100`;
        }

        function playTurn(playerType) {
            if(playerHP <= 0 || enemyHP <= 0) return;

            // 1. Generate Enemy Choice Randomly (Identical structure to your Java logic)
            const enemyType = types[Math.floor(Math.random() * types.length)];

            // Update Visual Badges on Active Stage
            const pBadge = document.getElementById('player-badge');
            pBadge.innerText = playerType;
            pBadge.className = `type-badge type-${playerType}`;

            const eBadge = document.getElementById('enemy-badge');
            eBadge.innerText = enemyType;
            eBadge.className = `type-badge type-${enemyType}`;

            appendLog(`<strong>[TURN START]</strong> You cast <b>${playerType.toUpperCase()}</b> vs Enemy's <b>${enemyType.toUpperCase()}</b>`, 'log-system');

            // 2. Calculate Modifiers (Rock-Paper-Scissors matrix from your source)
            let playerMod = 1.0;
            let enemyMod = 1.0;
            let effectivenessTextPlayer = "";
            let effectivenessTextEnemy = "";

            // Evaluate Player attack properties
            if (playerType === enemyType) {
                // Same type matches
            } else if (
                (playerType === 'fire' && enemyType === 'grass') ||
                (playerType === 'water' && enemyType === 'fire') ||
                (playerType === 'grass' && enemyType === 'water')
            ) {
                playerMod = 2.0;
                enemyMod = 0.5;
                effectivenessTextPlayer = " <span class='log-effective'>(It's super effective! 2.0x)</span>";
                effectivenessTextEnemy = " <span class='log-ineffective'>(It's not very effective... 0.5x)</span>";
            } else {
                playerMod = 0.5;
                enemyMod = 2.0;
                effectivenessTextPlayer = " <span class='log-ineffective'>(It's not very effective... 0.5x)</span>";
                effectivenessTextEnemy = " <span class='log-effective'>(It's super effective! 2.0x)</span>";
            }

            // 3. Apply Damage Logic
            let finalPlayerDmg = Math.round(BASE_DAMAGE * playerMod);
            let finalEnemyDmg = Math.round(BASE_DAMAGE * enemyMod);

            // Execute Stage Animations
            document.getElementById('enemy-card').classList.add('shake');
            document.getElementById('player-card').classList.add('shake');
            setTimeout(() => {
                document.getElementById('enemy-card').classList.remove('shake');
                document.getElementById('player-card').classList.remove('shake');
            }, 500);

            // Health Reductions
            enemyHP -= finalPlayerDmg;
            appendLog(`⚔️ Your attack dealt <b>${finalPlayerDmg}</b> damage to the Enemy AI.${effectivenessTextPlayer}`, 'log-damage');

            // Check if player speed burst knocked enemy down before back-attack
            if (enemyHP <= 0) {
                enemyHP = 0;
                updateHPMeters();
                endGame("🎉 VICTORY! You completely knocked out the Enemy AI!");
                return;
            }

            playerHP -= finalEnemyDmg;
            appendLog(`💥 Enemy back-attack dealt <b>${finalEnemyDmg}</b> damage to your Pokémon.${effectivenessTextEnemy}`, 'log-damage');

            if (playerHP <= 0) {
                playerHP = 0;
                updateHPMeters();
                endGame("💀 DEFEAT! Your Pokémon fainted. Better luck next time!");
                return;
            }

            updateHPMeters();
        }

        function endGame(resultMessage) {
            appendLog(resultMessage, 'log-victory');
            document.getElementById('battle-actions').style.display = 'none';
            document.getElementById('reset-row').style.display = 'flex';
        }

        function resetGame() {
            playerHP = 100;
            enemyHP = 100;
            updateHPMeters();

            document.getElementById('player-badge').className = 'type-badge';
            document.getElementById('player-badge').innerText = 'Selected: None';
            document.getElementById('enemy-badge').className = 'type-badge';
            document.getElementById('enemy-badge').innerText = 'Selected: None';

            document.getElementById('battle-actions').style.display = 'flex';
            document.getElementById('reset-row').style.display = 'none';

            logContainer.innerHTML = '<div class="log-entry log-system">> New Match Configured. Choose your first move element!</div>';
        }
    </script>
</body>
</html>
